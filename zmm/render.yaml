services:
  - type: web
    name: zmm-backend
    env: node
    buildCommand: cd backend && npm install
    startCommand: cd backend && node server.js
    envVars:
      - key: FRONTEND_URL
        value: https://zmm-frontend.onrender.com
      - key: PORT
        value: 4000

  - type: web
    name: zmm-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/build
    routes:
      - path: /
        destination: /index.html
    envVars:
      - key: REACT_APP_API_URL
        value: https://zmm-backend.onrender.com/api
