services:
  - type: web
    name: zmm-backend
    env: node
    rootDir: zmm
    buildCommand: |
      echo "Installing backend dependencies..."
      cd backend && npm install
      echo "Installing frontend dependencies..."
      cd ../frontend && npm install
      echo "Building frontend..."
      npm run build
      echo "Build complete"
    startCommand: cd backend && node server.js
    envVars:
      - key: PORT
        value: 4000
